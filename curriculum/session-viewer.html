<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WRH Master Curriculum Session Viewer - Interactive learning sessions with accessibility support">
    <title>Session | WRH Master Curriculum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0a',
                        zinc: { 950: '#09090b', 900: '#18181b', 800: '#27272a' },
                        amber: { 500: '#f59e0b', 600: '#d97706', 400: '#fbbf24' },
                        slate: { 700: '#334155', 800: '#1e293b' }
                    },
                    fontFamily: {
                        'display': ['Space Grotesk', 'sans-serif'],
                        'body': ['Inter', 'sans-serif']
                    },
                    backdropBlur: {
                        'xl': '20px'
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #09090b 0%, #0f0f1a 50%, #09090b 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background gradient */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(245, 158, 11, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .sticky-nav {
            backdrop-filter: blur(20px);
            background: rgba(9, 9, 11, 0.7);
            border-bottom: 1px solid rgba(245, 158, 11, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Accessibility: Focus Visible Styles */
        *:focus-visible {
            outline: 3px solid #fbbf24;
            outline-offset: 2px;
        }

        button:focus-visible,
        a:focus-visible {
            outline: 3px solid #fbbf24;
            outline-offset: 2px;
        }

        /* Markdown Styling - Premium */
        .markdown-content {
            line-height: 1.8;
            position: relative;
            z-index: 1;
        }

        .markdown-content h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 1.5rem;
            margin-top: 2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .markdown-content h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 1.25rem;
            margin-top: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(245, 158, 11, 0.3);
            position: relative;
        }

        .markdown-content h2::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            height: 2px;
            width: 0;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            animation: slideIn 0.6s ease-out forwards;
        }

        @keyframes slideIn {
            to {
                width: 100%;
            }
        }

        .markdown-content h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #fbbf24;
            margin-bottom: 1rem;
            margin-top: 1.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 1.25rem;
        }

        .markdown-content h4 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e5e7eb;
            margin-bottom: 0.75rem;
            margin-top: 1.25rem;
        }

        .markdown-content p {
            color: #d1d5db;
            margin-bottom: 1.25rem;
            font-size: 1.05rem;
            line-height: 1.85;
        }

        .markdown-content a {
            color: #fbbf24;
            text-decoration: underline;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
            border-bottom: 2px solid rgba(251, 191, 36, 0.3);
        }

        .markdown-content a:hover {
            color: #f59e0b;
            border-bottom-color: #f59e0b;
            transform: translateX(2px);
        }

        .markdown-content a:focus-visible {
            outline: 2px solid #fbbf24;
            outline-offset: 2px;
        }

        .markdown-content ul, .markdown-content ol {
            margin-bottom: 1.5rem;
            margin-left: 2rem;
        }

        .markdown-content li {
            color: #d1d5db;
            margin-bottom: 0.75rem;
            font-size: 1.05rem;
            line-height: 1.75;
        }

        .markdown-content code {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
            padding: 0.35rem 0.75rem;
            border-radius: 0.375rem;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            border: 1px solid rgba(245, 158, 11, 0.2);
            font-weight: 500;
        }

        .markdown-content pre {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            backdrop-filter: blur(10px);
        }

        .markdown-content pre code {
            background: transparent;
            color: #e5e7eb;
            padding: 0;
            border: none;
            font-size: 0.95rem;
        }

        .markdown-content blockquote {
            border-left: 4px solid #f59e0b;
            padding-left: 1.5rem;
            margin-left: 0;
            margin-bottom: 1.5rem;
            color: #9ca3af;
            font-style: italic;
            background: rgba(245, 158, 11, 0.05);
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .markdown-content th {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(59, 130, 246, 0.1));
            color: #fbbf24;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid rgba(245, 158, 11, 0.3);
        }

        .markdown-content td {
            color: #d1d5db;
            padding: 1rem;
            border-bottom: 1px solid rgba(245, 158, 11, 0.1);
        }

        .markdown-content tr:hover {
            background: rgba(245, 158, 11, 0.05);
        }

        .markdown-content strong {
            font-weight: 700;
            color: #fbbf24;
        }

        .markdown-content em {
            font-style: italic;
            color: #e5e7eb;
        }

        .markdown-content hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.3), transparent);
            margin: 2rem 0;
        }

        /* Content Container */
        .content-wrapper {
            position: relative;
            z-index: 1;
        }

        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.05), rgba(245, 158, 11, 0.1));
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 0.5rem;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Error State */
        .error-state {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.75rem;
            padding: 1.5rem;
            color: #fca5a5;
            margin-bottom: 2rem;
        }

        .error-state h3 {
            color: #fca5a5;
            margin-bottom: 0.5rem;
        }

        .error-state p {
            color: #fca5a5;
            font-size: 0.95rem;
        }

        /* Reading Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b);
            width: 0%;
            z-index: 1000;
            transition: width 0.1s ease-out;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
        }

        /* Sidebar TOC */
        .toc-sidebar {
            position: fixed;
            right: 0;
            top: 80px;
            width: 280px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            padding: 2rem 1.5rem;
            background: rgba(9, 9, 11, 0.6);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(245, 158, 11, 0.1);
            z-index: 40;
            display: none;
        }

        @media (min-width: 1400px) {
            .toc-sidebar {
                display: block;
            }
        }

        .toc-sidebar.active {
            display: block;
        }

        .toc-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .toc-list {
            list-style: none;
        }

        .toc-list li {
            margin-bottom: 0.5rem;
        }

        .toc-list a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.9rem;
            display: block;
            padding: 0.5rem 0.75rem;
            border-left: 2px solid transparent;
            transition: all 0.3s ease;
            border-radius: 0.375rem;
        }

        .toc-list a:hover,
        .toc-list a.active {
            color: #fbbf24;
            border-left-color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
            padding-left: 1rem;
        }

        /* Scroll Indicator */
        .scroll-indicator {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(59, 130, 246, 0.1));
            border: 2px solid rgba(245, 158, 11, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
        }

        .scroll-indicator.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .scroll-indicator:hover {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.3), rgba(59, 130, 246, 0.2));
            border-color: #f59e0b;
            transform: translateY(-4px);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(9, 9, 11, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #f59e0b, #fbbf24);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #fbbf24, #f59e0b);
        }

        /* Content Area */
        main {
            position: relative;
            z-index: 1;
        }

        /* Mobile Menu */
        .mobile-toc-toggle {
            display: none;
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            border: none;
            border-radius: 50%;
            color: #09090b;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 50;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(245, 158, 11, 0.3);
        }

        @media (max-width: 1399px) {
            .mobile-toc-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .mobile-toc-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(245, 158, 11, 0.4);
        }

        /* Back Button */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
            cursor: pointer;
        }

        .back-button:hover {
            background: rgba(245, 158, 11, 0.2);
            border-color: #f59e0b;
            transform: translateX(-4px);
        }

        .back-button:focus-visible {
            outline: 2px solid #fbbf24;
            outline-offset: 2px;
        }

        /* Session Header */
        .session-header {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(59, 130, 246, 0.05));
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        /* Footer */
        footer {
            background: rgba(9, 9, 11, 0.8);
            border-top: 1px solid rgba(245, 158, 11, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
            position: relative;
            z-index: 1;
        }

        /* Accessibility: Skip to main content link */
        .skip-to-main {
            position: absolute;
            top: -40px;
            left: 0;
            background: #fbbf24;
            color: #09090b;
            padding: 8px;
            text-decoration: none;
            z-index: 100;
            font-weight: 600;
        }

        .skip-to-main:focus {
            top: 0;
        }

        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Progress Bar -->

    <!-- Navigation -->
    <nav class="sticky-nav sticky top-0 z-50 border-b border-zinc-800" role="navigation" aria-label="Main navigation">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Table of Contents Sidebar -->
    <aside class="toc-sidebar" id="tocSidebar" role="complementary" aria-label="Table of contents">
        <div class="toc-title">On This Page</div>
        <ul class="toc-list" id="tocList"></ul>
    </aside>

    <!-- Main Content -->
    <main class="py-20 content-wrapper" id="main-content">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-8">
                <button id="back-button" class="back-button" aria-label="Go back to curriculum">&larr; Back to Curriculum</button>
            </div>

            <div class="session-header fade-in-up">
                <div id="content" class="markdown-content" role="main" aria-live="polite" aria-busy="true">
                    <div class="loading-state">
                        <div class="skeleton" style="height: 60px; border-radius: 0.5rem;"></div>
                        <div class="skeleton" style="height: 200px; border-radius: 0.5rem;"></div>
                        <div class="skeleton" style="height: 150px; border-radius: 0.5rem;"></div>
                    </div>
                    <p style="color: #9ca3af; text-align: center; margin-top: 2rem;">Loading session…</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Scroll to Top Button -->
    <button class="scroll-indicator" id="scrollToTop" title="Back to top" aria-label="Scroll to top">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
        </svg>
    </button>

    <!-- Mobile TOC Toggle -->
    <button class="mobile-toc-toggle" id="tocToggle" title="Toggle table of contents" aria-label="Toggle table of contents" aria-expanded="false" aria-controls="tocSidebar">
        ☰
    </button>

    <!-- Footer -->
    <footer role="contentinfo">

        UEI: HH77KN5AV5X7 | CAGE: 9ZFJ6</p>
    </footer>

    <script>
        // Get the markdown file path from URL parameter
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');

        // Progress tracking
        const progressBar = document.querySelector('.progress-bar');
        const scrollToTopBtn = document.getElementById('scrollToTop');
        const contentDiv = document.getElementById('content');

        window.addEventListener('scroll', function() {
            const windowHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (window.scrollY / windowHeight) * 100;
            progressBar.style.width = scrolled + '%';
            progressBar.setAttribute('aria-valuenow', Math.round(scrolled));

            // Show/hide scroll to top button
            if (window.scrollY > 300) {
                scrollToTopBtn.classList.add('visible');
            } else {
                scrollToTopBtn.classList.remove('visible');
            }
        });

        // Scroll to top
        scrollToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Mobile TOC toggle
        const tocSidebar = document.getElementById('tocSidebar');
        const tocToggle = document.getElementById('tocToggle');

        tocToggle.addEventListener('click', () => {
            const isExpanded = tocSidebar.classList.toggle('active');
            tocToggle.setAttribute('aria-expanded', isExpanded);
        });

        // Close TOC when clicking outside
        document.addEventListener('click', (e) => {
            if (!tocSidebar.contains(e.target) && !tocToggle.contains(e.target)) {
                tocSidebar.classList.remove('active');
                tocToggle.setAttribute('aria-expanded', false);
            }
        });

        if (!file || !/^[a-zA-Z0-9/_-]+\.md$/.test(file)) {
            contentDiv.innerHTML = `
                <div class="error-state">
                    <h3>Error: Invalid Session File</h3>
                    <p>No valid session file was specified. Please return to the curriculum and select a session to view.</p>
                </div>
            `;
            contentDiv.setAttribute('aria-busy', false);
        } else {
            // Determine the base path for GitHub Pages
            const base = window.location.hostname.endsWith('github.io')
                ? `/${window.location.pathname.split('/')[1]}/`
                : '/';

            // Build the absolute path to the markdown file
            const markdownPath = `${base}${file}`;

            // Fetch and render the markdown file
            fetch(markdownPath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Could not load session: HTTP ${response.status}. Path: ${markdownPath}`);
                    }
                    return response.text();
                })
                .then(markdown => {
                    // Configure marked options
                    marked.setOptions({
                        breaks: true,
                        gfm: true,
                    });

                    // Convert markdown to HTML
                    const html = marked.parse(markdown);

                    // Sanitize HTML to prevent XSS
                    const sanitized = DOMPurify.sanitize(html);

                    // Insert into page
                    contentDiv.innerHTML = sanitized;
                    contentDiv.setAttribute('aria-busy', false);

                    // Generate Table of Contents
                    generateTableOfContents();

                    // Highlight active TOC item on scroll
                    updateActiveTocItem();
                })
                .catch(error => {
                    contentDiv.innerHTML = `
                        <div class="error-state">
                            <h3>Error Loading Session</h3>
                            <p>${error.message}</p>
                            <p style="margin-top: 1rem; font-size: 0.9rem;">Please check your connection and try again, or return to the curriculum.</p>
                        </div>
                    `;
                    contentDiv.setAttribute('aria-busy', false);
                });
        }

        // Generate Table of Contents from headings
        function generateTableOfContents() {
            const content = document.getElementById('content');
            const headings = content.querySelectorAll('h2, h3');
            const tocList = document.getElementById('tocList');
            tocList.innerHTML = '';

            if (headings.length === 0) {
                tocList.innerHTML = '<li style="color: #9ca3af; font-size: 0.9rem;">No sections found</li>';
                return;
            }

            headings.forEach((heading, index) => {
                const id = `heading-${index}`;
                heading.id = id;

                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${id}`;
                a.textContent = heading.textContent;
                a.style.paddingLeft = heading.tagName === 'H3' ? '1.5rem' : '0.75rem';

                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    updateActiveTocItem();
                });

                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        // Update active TOC item based on scroll position
        function updateActiveTocItem() {
            const headings = document.querySelectorAll('#content h2, #content h3');
            const tocLinks = document.querySelectorAll('.toc-list a');

            window.addEventListener('scroll', () => {
                let current = '';
                headings.forEach(heading => {
                    const sectionTop = heading.offsetTop;
                    if (pageYOffset >= sectionTop - 100) {
                        current = heading.getAttribute('id');
                    }
                });

                tocLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === `#${current}`) {
                        link.classList.add('active');
                    }
                });
            });
        }

        // Back button functionality
        document.getElementById('back-button').addEventListener('click', function() {
            history.back();
        });

        // Smooth scroll for anchor links
        document.addEventListener('click', (e) => {
            if (e.target.tagName === 'A' && e.target.getAttribute('href')?.startsWith('#')) {
                e.preventDefault();
                const target = document.querySelector(e.target.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            }
        });
    </script>
</body>
</html>
