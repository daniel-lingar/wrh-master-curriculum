<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WRH Master Curriculum Session Viewer - Interactive learning sessions with accessibility support">
    <title>Session | WRH Master Curriculum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0a',
                        zinc: { 950: '#09090b', 900: '#18181b', 800: '#27272a' },
                        amber: { 500: '#f59e0b', 600: '#d97706', 400: '#fbbf24' },
                        slate: { 700: '#334155', 800: '#1e293b' }
                    },
                    fontFamily: {
                        'display': ['Space Grotesk', 'sans-serif'],
                        'body': ['Inter', 'sans-serif']
                    },
                    backdropBlur: {
                        'xl': '20px'
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #09090b 0%, #0f0f1a 50%, #09090b 100%);
            position: relative;
            overflow-x: hidden;
            color: #d1d5db;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(245, 158, 11, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .sticky-nav {
            backdrop-filter: blur(20px);
            background: rgba(9, 9, 11, 0.7);
            border-bottom: 1px solid rgba(245, 158, 11, 0.1);
        }
        .markdown-content { line-height: 1.8; position: relative; z-index: 1; }
        .markdown-content h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin: 2rem 0 1.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .markdown-content h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: #ffffff;
            margin: 2.5rem 0 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(245, 158, 11, 0.2);
        }
        .markdown-content h3 { color: #fbbf24; margin: 1.75rem 0 1rem; font-size: 1.25rem; }
        .markdown-content p { margin-bottom: 1.25rem; }
        .markdown-content ul, .markdown-content ol { margin: 0 0 1.5rem 1.5rem; }
        .markdown-content li { margin-bottom: 0.5rem; }
        .markdown-content a { color: #fbbf24; text-decoration: underline; }
        .markdown-content blockquote {
            border-left: 4px solid #f59e0b;
            padding: 1rem 1.5rem;
            background: rgba(245, 158, 11, 0.05);
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-style: italic;
        }
        .error-state {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.75rem;
            padding: 2rem;
            color: #fca5a5;
            text-align: center;
        }
        .loading-state { padding: 4rem 0; text-align: center; color: #9ca3af; }
        .skeleton {
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.05), rgba(245, 158, 11, 0.1));
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            height: 20px; margin-bottom: 1rem; border-radius: 4px;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="sticky-nav sticky top-0 z-50 h-16 flex items-center px-6">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <a href="../index.html" class="text-xl font-bold text-white font-display">
                WRH <span class="text-amber-400">Master</span>
            </a>
            <div class="hidden md:flex space-x-6 text-sm font-medium">
                <a href="../index.html" class="hover:text-amber-400 transition-colors">Home</a>
                <a href="index.html" class="text-white hover:text-amber-400 transition-colors">Curriculum</a>
                <a href="../start-here.html" class="hover:text-amber-400 transition-colors">Start Here</a>
                <a href="../contact.html" class="hover:text-amber-400 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-12 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="mb-8">
                <button onclick="history.back()" class="text-amber-400 hover:text-amber-300 flex items-center gap-2 transition-colors">
                    &larr; Back to Curriculum
                </button>
            </div>

            <div id="content" class="markdown-content bg-zinc-900/50 backdrop-blur-sm border border-zinc-800 rounded-2xl p-8 md:p-12 shadow-2xl min-h-[400px]">
                <div class="loading-state">
                    <div class="skeleton w-3/4 mx-auto h-12 mb-8"></div>
                    <div class="skeleton w-full"></div>
                    <div class="skeleton w-5/6"></div>
                    <div class="skeleton w-full"></div>
                    <p class="mt-4">Loading session content...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-8 px-6 border-t border-zinc-800 text-center text-sm text-zinc-500">
        <p>&copy; 2024 Capitol Contracts LLC. All rights reserved.</p>
        <p class="mt-1">UEI: HH77KN5AV5X7 | CAGE: 9ZFJ6</p>
    </footer>

    <script>
        const contentDiv = document.getElementById('content');
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');

        if (!file || !/^[a-zA-Z0-9/._-]+\.md$/.test(file)) {
            contentDiv.innerHTML = `
                <div class="error-state">
                    <h3 class="text-xl font-bold mb-2">Invalid Session</h3>
                    <p>No valid session file was specified. Please return to the curriculum index.</p>
                    <a href="index.html" class="mt-4 inline-block text-amber-400 underline">Return to Curriculum Index</a>
                </div>
            `;
        } else {
            // Robust Base Path Detection
            let base = '/';
            if (window.location.hostname.endsWith('github.io')) {
                const pathParts = window.location.pathname.split('/');
                if (pathParts.length > 1 && pathParts[1] !== '') {
                    // Check if we're in a project site (path starts with repo name)
                    // The first part of the path is usually the repo name on github.io
                    base = `/${pathParts[1]}/`;
                }
            }

            const markdownPath = `${base}${file.startsWith('/') ? file.slice(1) : file}`;

            fetch(markdownPath)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.text();
                })
                .then(markdown => {
                    marked.setOptions({ breaks: true, gfm: true });
                    const html = marked.parse(markdown);
                    contentDiv.innerHTML = DOMPurify.sanitize(html);
                    
                    // Update Page Title
                    const firstH1 = contentDiv.querySelector('h1');
                    if (firstH1) document.title = `${firstH1.textContent} | WRH Master`;
                })
                .catch(error => {
                    contentDiv.innerHTML = `
                        <div class="error-state">
                            <h3 class="text-xl font-bold mb-2">Error Loading Session</h3>
                            <p>Failed to load session content: ${error.message}</p>
                            <p class="mt-2 text-xs opacity-50">Path: ${markdownPath}</p>
                            <a href="index.html" class="mt-4 inline-block text-amber-400 underline">Return to Curriculum Index</a>
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>
